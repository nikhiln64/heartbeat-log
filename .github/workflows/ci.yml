name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # Default suite only: the KIP-101 red variant (redTest) and the fuzzer
      # (fuzzRed) are deliberately excluded so CI stays green while the
      # failing demo remains one command away.
      - run: ./gradlew test
